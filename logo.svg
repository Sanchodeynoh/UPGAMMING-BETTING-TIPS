<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120" role="img" aria-label="UPGAMMING BETTING TIPS logo">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9e27a"/>
      <stop offset="100%" stop-color="#d4a017"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3ecf6a"/>
      <stop offset="100%" stop-color="#116b34"/>
    </linearGradient>
  </defs>

  <!-- Icon: badge with football + ascending trend line -->
  <g transform="translate(8,8)">
    <circle cx="52" cy="52" r="50" fill="#0a0a0a" stroke="url(#goldGrad)" stroke-width="4"/>

    <!-- Football (soccer ball), simplified -->
    <circle cx="40" cy="62" r="20" fill="#101010" stroke="url(#greenGrad)" stroke-width="2.5"/>
    <polygon points="40,52 47,57 44,65 36,65 33,57" fill="url(#greenGrad)"/>
    <path d="M40 52 L40 42" stroke="url(#greenGrad)" stroke-width="2" />
    <path d="M47 57 L56 53" stroke="url(#greenGrad)" stroke-width="2" />
    <path d="M44 65 L48 74" stroke="url(#greenGrad)" stroke-width="2" />
    <path d="M36 65 L32 74" stroke="url(#greenGrad)" stroke-width="2" />
    <path d="M33 57 L24 53" stroke="url(#greenGrad)" stroke-width="2" />

    <!-- Ascending trend line + arrow, breaking out of the ball upward -->
    <polyline points="18,80 34,68 46,74 64,46 78,30"
              fill="none" stroke="url(#goldGrad)" stroke-width="4"
              stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="78,30 66,33 75,40" fill="url(#goldGrad)"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(126,40)" font-family="'Segoe UI', Arial, sans-serif">
    <text x="0" y="0" font-size="30" font-weight="800" fill="url(#goldGrad)" letter-spacing="1">UPGAMMING</text>
    <text x="0" y="30" font-size="16" font-weight="600" fill="#9fe0b0" letter-spacing="3">BETTING TIPS</text>
  </g>
</svg>
